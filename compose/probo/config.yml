  aws:
    access-key-id: probod
    bucket: probod
    endpoint: https://s3-probo.coremote.io
    region: us-east-1
    secret-access-key: thisisnotasecret
    use-path-style: true
  base-url: https://probo.coremote.io
  chrome-dp-addr: chrome:9222
  connectors: null
  custom-domains:
    acme:
      account-key: ""
      directory: https://acme-v02.api.letsencrypt.org/directory
      email: admin@getprobo.com
      key-type: EC256
      root-ca: ""
    caa-issuer-domain: letsencrypt.org
    cname-target: custom.getprobo.com
    provision-interval: 30
    renewal-interval: 3600
    resolver-addr: 8.8.8.8:53
  encryption-key: hcAfx6/lKWqEHA6+agNiTQ3PaYWMrgB2ZBkldyPFpPw=
  esign:
    tsa-url: http://timestamp.digicert.com
  evidence-describer:
    interval: 10
    max-concurrency: 10
    max-tokens: null
    model-name: ""
    provider: ""
    stale-after: 300
    temperature: null
  llm:
    defaults:
      max-tokens: 4096
      model-name: gpt-4o
      provider: openai
      temperature: 0.1
    providers:
      anthropic:
        api-key: ""
        type: anthropic
      openai:
        api-key: ""
        type: openai
  notifications:
    mailer:
      mailer-interval: 60
      sender-email: no-reply@yourdomain.com
      sender-name: Probo
      smtp:
        addr: email-smtp.us-east-1.amazonaws.com:587
        password: ""
        tls-required: true
        user: ""
    slack:
      sender-interval: 60
      signing-secret: ""
    webhook:
      cache-ttl: 86400
      sender-interval: 5
  pg:
    addr: probo-postgres:5432
    ca-cert-bundle: ""
    database: probod
    debug: false
    password: postgres
    pool-size: 100
    username: postgres
  probo-agent:
    max-tokens: null
    model-name: ""
    provider: ""
    temperature: null
  scim-bridge:
    poll-interval: 30
    sync-interval: 900
  trust-center:
    http-addr: :80
    https-addr: :443
    proxy-protocol:
      trusted-proxies: null
unit:
  metrics:
    addr: probo:8081
  tracing:
    addr: localhost:4317
    batch-timeout: 5
    export-timeout: 30
    max-batch-size: 512
    max-queue-size: 2048
